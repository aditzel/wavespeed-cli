name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_current_version:
        description: "Publish package.json version if it is tagged but missing from npm"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Test CLI executable
        run: ./dist/index.js --help

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      id-token: write
    if: github.ref == 'refs/heads/main' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):'))
    env:
      NPM_CONFIG_ACCESS: public
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Update npm for OIDC support
        run: npm install -g npm@11.16.0

      - name: Publish current tagged version
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_current_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.name)")
          PACKAGE_VERSION=$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.version)")
          PACKAGE_TAG="v${PACKAGE_VERSION}"

          if ! git rev-parse "${PACKAGE_TAG}" >/dev/null 2>&1; then
            echo "Expected git tag ${PACKAGE_TAG} to exist before running recovery publish"
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published"
          else
            npm publish --provenance --access public
          fi

          if gh release view "${PACKAGE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${PACKAGE_TAG} already exists"
          else
            gh release create "${PACKAGE_TAG}" --verify-tag --title "${PACKAGE_TAG}" --generate-notes
          fi

      - name: Run semantic-release
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.publish_current_version) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release
